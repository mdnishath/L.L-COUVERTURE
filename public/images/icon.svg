<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1E3A5F"/>

  <!-- Mountains -->
  <path d="M80 280L160 200L240 260L320 180L400 240L432 280z" fill="#ffffff" opacity="0.08"/>

  <!-- Back roof -->
  <path d="M256 100L130 240h252z" fill="#ffffff" opacity="0.12"/>
  <!-- Main roof -->
  <path d="M240 120L110 260h260z" fill="#ffffff" opacity="0.25"/>
  <!-- Roof edge -->
  <path d="M110 260L240 120L370 260" fill="none" stroke="#D4942A" stroke-width="8" stroke-linecap="round"/>

  <!-- House body -->
  <rect x="150" y="260" width="180" height="65" rx="4" fill="#ffffff" opacity="0.1"/>
  <!-- Windows -->
  <rect x="175" y="272" width="30" height="28" rx="3" fill="#ffffff" opacity="0.08"/>
  <rect x="285" y="272" width="30" height="28" rx="3" fill="#ffffff" opacity="0.08"/>

  <!-- Crossed tools -->
  <g transform="translate(275, 80) rotate(-30)">
    <rect x="-5" y="0" width="10" height="90" rx="4" fill="#D4942A" opacity="0.8"/>
    <path d="M-22 -10h44c3 0 6 3 6 6v12c0 3-3 6-6 6h-44c-3 0-6-3-6-6v-12c0-3 3-6 6-6z" fill="#ffffff" opacity="0.35"/>
  </g>
  <g transform="translate(320, 95) rotate(30)">
    <rect x="-4" y="0" width="8" height="80" rx="3" fill="#D4942A" opacity="0.65"/>
  </g>

  <!-- L.L text -->
  <rect x="176" y="350" width="160" height="52" rx="10" fill="#D4942A"/>
  <text x="256" y="388" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-weight="900" font-size="38" fill="#ffffff" letter-spacing="8">L.L</text>

  <!-- COUVERTURE -->
  <text x="256" y="432" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="22" fill="#ffffff" opacity="0.7" letter-spacing="5">COUVERTURE</text>
</svg>
